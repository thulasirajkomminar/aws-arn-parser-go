name: SAR sync

on:
  schedule:
    # Mondays 06:00 UTC — refresh weekly
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Regenerate arn/services_generated.go
        run: go run ./internal/sarsync

      - name: Run tests
        run: go test -race ./...

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(sarsync): refresh SAR service rules"
          title: "chore(sarsync): refresh SAR service rules"
          body: |
            Automated refresh of `arn/services_generated.go` from
            <https://servicereference.us-east-1.amazonaws.com/>.

            Triggered by the weekly `SAR sync` workflow.
          branch: sarsync/refresh
          delete-branch: true
          add-paths: |
            arn/services_generated.go
